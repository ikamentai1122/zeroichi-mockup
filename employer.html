<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>ボスマッチ — 事業者ダッシュボード</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- big view switch -->
<div class="viewswitch-wrap">
  <a class="vs-home" href="index.html">ボス<em>マッチ</em></a>
  <div class="viewswitch">
    <a href="employer.html" class="active"><span class="vs-dot"></span>事業者の画面</a>
    <a href="seekers.html"><span class="vs-dot"></span>求職者の画面</a>
  </div>
</div>

<main class="appshell">
  <!-- big register CTA -->
  <a class="regcta" href="register.html">
    <div class="rc-body">
      <div class="rc-k">まずはここから</div>
      <div class="rc-t">＋ 現場の先輩を登録する</div>
      <div class="rc-sub">求人票でなく「実際に教える人」を載せる。掲載は無料。登録するとすぐ求職者の画面に並びます。</div>
    </div>
    <span class="rc-btn">先輩を登録 →</span>
  </a>

  <!-- traction KPIs -->
  <div class="kpis" id="kpis"></div>

  <div class="apphead">
    <div>
      <h1 id="bizname"></h1>
      <p class="sub">届いたライク(求職者からの「この先輩の下でやってみたい」)</p>
    </div>
    <span class="bizchip"><span class="dot"></span> <span id="cnt"></span></span>
  </div>

  <div class="leads" id="leads"></div>

  <p style="margin-top:26px;font-size:12.5px;color:var(--muted);text-align:center">
    <a href="#" onclick="resetDemo();return false;" style="color:var(--muted)">この画面をリセット</a>
  </p>
</main>

<!-- action modal -->
<div class="modal-bg" id="modalbg">
  <div class="modal" id="modal"></div>
</div>

<script src="app.js"></script>
<script>
  document.getElementById("bizname").textContent = BIZ.name;
  const COORD_FEE = 30000; // 有給一日体験のコーディネート料

  // 商談で「生きている」画面に見せるため、複数ステージのライクを用意。
  (function seed() {
    if (!localStorage.getItem("ichinichi_seeded_v2")) {
      const mins = m => new Date(Date.now() - m * 60000).toISOString();
      saveLikes([
        { mentorId: "m1", seeker: { name: "渡辺 さん(26)", prev: "元・アパレル販売(4年) / 春日市在住", note: "体を動かす仕事に変えたい。人に教えてもらえる環境が希望。" }, at: mins(60 * 48), status: "trial" },
        { mentorId: "m2", seeker: { name: "井上 さん(31)", prev: "元・経理事務(6年) / 福岡市在住", note: "数字と書類は得意。手に職をつけたい。" }, at: mins(60 * 6), status: "meal" },
        { mentorId: "m4", seeker: { name: "木下 さん(34)", prev: "元・飲食店長(8年) / 大野城市在住", note: "現場は未経験ですが、段取りとチーム管理には自信あり。" }, at: mins(95), status: "new" },
      ]);
      localStorage.setItem("ichinichi_seeded_v2", "1");
    }
  })();

  const leadsEl = document.getElementById("leads");
  const modalbg = document.getElementById("modalbg");
  const modal = document.getElementById("modal");

  // 求職者アバターはニュートラルなスレート系で先輩と区別
  function seekerFill() { return "linear-gradient(140deg,#5b6472,#39414d)"; }

  function fmt(iso) {
    const d = new Date(iso), now = new Date();
    const mins = Math.round((now - d) / 60000);
    if (mins < 1) return "たった今";
    if (mins < 60) return mins + "分前";
    const h = Math.round(mins / 60);
    if (h < 24) return h + "時間前";
    return Math.round(h / 24) + "日前";
  }

  function renderKpis() {
    const likes = loadLikes();
    const meals = likes.filter(l => l.status === "meal" || l.status === "trial").length;
    const trials = likes.filter(l => l.status === "trial").length;
    const revenue = trials * COORD_FEE;
    const tiles = [
      { v: likes.length, u: "件", l: "届いたライク(今週)" },
      { v: meals, u: "件", l: "飯に誘い済み" },
      { v: trials, u: "件", l: "有給一日体験を設定" },
      { v: "¥" + revenue.toLocaleString(), u: "", l: "発生コーディネート料", accent: true },
    ];
    document.getElementById("kpis").innerHTML = tiles.map(t => `
      <div class="kpi ${t.accent ? "accent" : ""}">
        <div class="kv">${t.v}${t.u ? `<small>${t.u}</small>` : ""}</div>
        <div class="kl">${t.l}</div>
      </div>`).join("");
  }

  function pipeline(status) {
    const idx = status === "new" ? 1 : status === "meal" ? 2 : 3; // 到達ステージ
    const steps = ["ライク", "飯に誘う", "一日体験"];
    let html = '<div class="pipeline">';
    steps.forEach((s, i) => {
      const n = i + 1;
      const cls = n < idx ? "done" : (n === idx ? (status === "trial" ? "done" : "active") : "");
      if (i > 0) html += `<div class="pbar ${n <= idx ? "filled" : ""}"></div>`;
      html += `<div class="pstep ${cls}"><span class="pnum">${n < idx || (n === idx && status === "trial") ? "✓" : n}</span>${s}</div>`;
    });
    return html + "</div>";
  }

  function render() {
    renderKpis();
    const stored = loadLikes();
    const likes = stored.slice().reverse();
    document.getElementById("cnt").textContent = likes.length + " 件のライク";
    if (likes.length === 0) {
      leadsEl.innerHTML = `<div class="empty">まだライクはありません。<br><a href="seekers.html">求職者の画面</a>で先輩にライクを送ると、ここに届きます。</div>`;
      return;
    }
    leadsEl.innerHTML = "";
    likes.forEach((l, idx) => {
      const m = mentorById(l.mentorId);
      if (!m) return;
      const realIdx = stored.length - 1 - idx;
      const done = l.status === "trial";
      const el = document.createElement("div");
      el.className = "lead" + (done ? " contacted" : "");
      el.style.animationDelay = (idx * 0.06) + "s";
      el.innerHTML = `
        <div class="lt">
          <div class="avatar seeker-av" style="background:${seekerFill()}">${l.seeker.name.charAt(0)}</div>
          <span class="arrow">→</span>
          <div class="avatar" style="background:${mentorFill(m)};width:44px;height:44px;font-size:16px;border-radius:13px">${m.initial}</div>
          <div style="margin-left:4px">
            <div class="seeker">${l.seeker.name}${l.status === "new" ? '<span class="badge-new">NEW</span>' : ""}</div>
            <div class="meta">${l.seeker.prev} ・ ${fmt(l.at)}</div>
          </div>
        </div>
        <p class="liketo">「<b>${m.name}</b>(${m.role})」の下でやってみたい</p>
        <p style="font-size:14px;color:var(--ink-soft);margin:8px 0 0">本人メモ:${l.seeker.note}</p>
        ${pipeline(l.status)}
        <div class="actions">
          ${l.status === "new"
            ? `<button class="btn btn-primary btn-sm" data-act="meal" data-i="${realIdx}">飯に誘う(無料)</button>`
            : l.status === "meal"
            ? `<span class="status-pill">✓ 飯に誘い済み</span>
               <button class="btn btn-primary btn-sm" data-act="trial" data-i="${realIdx}">有給一日体験を設定</button>`
            : `<span class="status-pill">✓ 有給一日体験を設定済み</span>
               <span class="money">コーディネート料 ¥${COORD_FEE.toLocaleString()} 発生</span>`}
        </div>`;
      leadsEl.appendChild(el);
    });
    leadsEl.querySelectorAll("button[data-act]").forEach(b => {
      b.addEventListener("click", () => openAction(parseInt(b.dataset.i), b.dataset.act));
    });
  }

  function openAction(i, act) {
    const likes = loadLikes();
    const l = likes[i];
    const m = mentorById(l.mentorId);
    const first = l.seeker.name.split(" ")[0];
    const isTrial = act === "trial";
    const msg = isTrial
      ? `${first}さん、先日はありがとうございました。よければ近いうちに<b>一日、現場を体験</b>してみませんか?当日は<b>日当をお支払い</b>します。実際の仕事を見て、お互い「やれそうか」を確かめましょう。`
      : `${first}さん、ライクありがとうございます。${BIZ.name}の${m.name}です。まずは一度、ご飯でも食べながら現場の話をしませんか?`;
    const feeBox = isTrial
      ? `<div style="background:var(--accent-soft);border:1px solid rgba(238,108,77,.3);border-radius:10px;padding:12px 14px;margin-top:12px;font-size:13px;color:var(--ink-soft)">
           この有給一日体験のコーディネート料: <b style="color:var(--accent-ink)">¥${COORD_FEE.toLocaleString()}</b><br>
           <span style="color:var(--muted)">日程調整・当日の付きそい・体験後の相互フィードバック収集こみ。${(m.role || "").includes("施工管理") ? "対象職種のため、採用成立時は別途 ¥250,000。" : ""}</span>
         </div>`
      : `<p style="font-size:13px;color:var(--muted);margin-top:10px">飯は無料です。会って相性が良ければ、次は有給の一日体験へ。</p>`;
    modal.innerHTML = `
      <button class="x" onclick="closeModal()">×</button>
      <h3>${isTrial ? "有給一日体験を設定" : "飯に誘う"}</h3>
      <div class="mrole">${l.seeker.name} → ${m.name}(${m.role})</div>
      <div class="field"><div class="k">送るメッセージ(雛形)</div><div class="v">${msg}</div></div>
      <textarea class="inp" rows="2" style="margin-top:6px">${isTrial ? "体験候補日:今週土曜 / 来週水曜" : "候補日:今週金曜の夜 / 来週月曜のお昼"}</textarea>
      ${feeBox}
      <div class="actions">
        <button class="btn btn-primary" id="confirm">${isTrial ? "この内容で体験を設定する" : "この内容で飯に誘う"}</button>
      </div>
      <p style="font-size:12px;color:var(--muted);margin:14px 0 0">※ この画面ではメッセージは送信されません(プレビュー)。</p>`;
    modal.querySelector("#confirm").addEventListener("click", () => {
      const arr = loadLikes();
      arr[i].status = isTrial ? "trial" : "meal";
      saveLikes(arr);
      closeModal();
      toast(isTrial ? "有給一日体験を設定しました。" : "飯に誘いました。");
      render();
    });
    modalbg.classList.add("open");
  }
  function closeModal() { modalbg.classList.remove("open"); }
  window.closeModal = closeModal;
  modalbg.addEventListener("click", (e) => { if (e.target === modalbg) closeModal(); });

  function resetDemo() {
    localStorage.removeItem("ichinichi_likes_v1");
    localStorage.removeItem("ichinichi_seeded_v1");
    localStorage.removeItem("ichinichi_seeded_v2");
    location.reload();
  }
  window.resetDemo = resetDemo;

  render();
</script>
</body>
</html>
