<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ボスマッチ — 求職者画面(デモ)</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="demobar">
  <span><b>DEMO</b> 求職者の画面 — 先輩にライクを送ると <a href="employer.html">事業者ダッシュボード</a> に届きます</span>
  <span class="sep">|</span>
  <a href="index.html">事業者向けTOP</a>
  <a href="register.html">先輩を登録</a>
  <a href="seekers.html">求職者画面</a>
  <a href="employer.html">事業者ダッシュボード</a>
</div>

<header class="site">
  <div class="wrap bar">
    <a class="brand" href="index.html">
      <span class="mark">ボス<em>マッチ</em></span>
      <span class="tag">求職者として見る</span>
    </a>
    <nav class="navlinks">
      <a href="index.html">事業者向けTOP</a>
    </nav>
  </div>
</header>

<main class="appshell">
  <div class="apphead">
    <div>
      <h1 id="bizname"></h1>
      <p class="sub" id="bizsub"></p>
    </div>
    <span class="bizchip"><span class="dot"></span> 募集中</span>
  </div>

  <p style="background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:14px 18px;font-size:14px;color:var(--ink-soft);box-shadow:var(--shadow);margin-top:0">
    この会社で<b>実際にあなたを教える先輩</b>たちです。人柄や教え方を見て、「この人の下でやってみたい」と思ったら<b>ライク</b>を送りましょう。気が合えば、まず一緒にご飯や一日体験から。
  </p>

  <div class="mentors" id="grid" style="margin-top:20px"></div>
</main>

<!-- profile modal -->
<div class="modal-bg" id="modalbg">
  <div class="modal" id="modal"></div>
</div>

<script src="app.js"></script>
<script>
  document.getElementById("bizname").textContent = BIZ.name;
  document.getElementById("bizsub").textContent = BIZ.trade + " ・ " + BIZ.area + " ・ " + BIZ.size;

  const grid = document.getElementById("grid");
  const modalbg = document.getElementById("modalbg");
  const modal = document.getElementById("modal");

  function isLiked(id) { return loadLikes().some(l => l.mentorId === id); }

  function sendLike(id) {
    if (isLiked(id)) return;
    const likes = loadLikes();
    likes.push({
      mentorId: id,
      seeker: DEMO_SEEKER,
      at: new Date().toISOString(),
      status: "new",
    });
    saveLikes(likes);
    const m = mentorById(id);
    toast("「" + m.name + "」さんにライクを送りました。事業者に通知されました。");
    render();
    if (modalbg.classList.contains("open")) openProfile(id);
  }

  function mbtiOf(m) {
    const f = (m.facts || []).find(x => x.k.toUpperCase() === "MBTI");
    return f ? f.v.split("(")[0].trim() : null;
  }

  function render() {
    grid.innerHTML = "";
    allMentors().forEach(m => {
      const liked = isLiked(m.id);
      const mbti = mbtiOf(m);
      const el = document.createElement("div");
      el.className = "mentor";
      el.innerHTML = `
        <div class="top">
          <div class="avatar" style="background:${m.color}">${m.initial}</div>
          <div>
            <div class="name">${m.name} ${mbti ? `<span class="mbti">${mbti}</span>` : ""}</div>
            <div class="role">${m.role} ・ ${m.years}</div>
          </div>
        </div>
        <p class="blurb">${m.intro ? m.intro : "「" + m.style + "」"}</p>
        <div class="tags">${m.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
        <div class="row">
          <span style="font-size:13px;color:var(--muted)">${m.prevJob}</span>
          <button class="likebtn ${liked ? "liked" : ""}" data-id="${m.id}">
            <span class="h">♥</span> ${liked ? "ライク済み" : "ライクを送る"}
          </button>
        </div>`;
      el.addEventListener("click", (e) => {
        if (e.target.closest(".likebtn")) { e.stopPropagation(); sendLike(m.id); return; }
        openProfile(m.id);
      });
      grid.appendChild(el);
    });
  }

  function openProfile(id) {
    const m = mentorById(id);
    const liked = isLiked(id);
    modal.innerHTML = `
      <button class="x" onclick="closeModal()">×</button>
      <div class="top" style="display:flex;gap:14px;align-items:center">
        <div class="avatar" style="background:${m.color}">${m.initial}</div>
        <div>
          <h3>${m.name} ${mbtiOf(m) ? `<span class="mbti">${mbtiOf(m)}</span>` : ""}</h3>
          <div class="mrole">${m.role} ・ ${m.years}</div>
        </div>
      </div>
      ${m.intro ? `<div class="field"><div class="k">自己紹介</div><div class="v">${m.intro}</div></div>` : ""}
      <div class="field"><div class="k">前職</div><div class="v">${m.prevJob}</div></div>
      ${(m.facts || []).map(f => `<div class="field"><div class="k">${f.k}</div><div class="v">${f.v}</div></div>`).join("")}
      <div class="field"><div class="k">教え方</div><div class="v">「${m.style}」</div></div>
      <div class="field"><div class="k">一日の流れ</div><div class="v">${m.aboutDay}</div></div>
      <div class="tags">${m.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
      <div class="actions">
        <button class="btn btn-primary ${liked ? "" : ""}" id="mlike" ${liked ? "disabled style=opacity:.6" : ""}>
          ♥ ${liked ? "ライク済み(通知されました)" : "この先輩にライクを送る"}
        </button>
      </div>
      <p style="font-size:12px;color:var(--muted);margin:14px 0 0">ライクを送ると、この会社の担当者に通知が届きます。先方から連絡が来たら、まずはご飯や一日体験から。</p>`;
    const b = modal.querySelector("#mlike");
    if (!liked) b.addEventListener("click", () => sendLike(id));
    modalbg.classList.add("open");
  }
  function closeModal() { modalbg.classList.remove("open"); }
  modalbg.addEventListener("click", (e) => { if (e.target === modalbg) closeModal(); });

  render();
</script>
</body>
</html>
