<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>ボスマッチ — 求職者アプリ</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- big view switch -->
<div class="viewswitch-wrap">
  <a class="vs-home" href="index.html">ボス<em>マッチ</em></a>
  <div class="viewswitch">
    <a href="employer.html"><span class="vs-dot"></span>事業者の画面</a>
    <a href="seekers.html" class="active"><span class="vs-dot"></span>求職者の画面</a>
  </div>
</div>

<main class="appshell">
  <div class="apphead">
    <div>
      <h1 id="bizname"></h1>
      <p class="sub" id="bizsub"></p>
    </div>
    <span class="bizchip"><span class="dot"></span> 募集中</span>
  </div>

  <p class="feed-hint" style="margin:0 0 20px">
    この会社で<b>実際にあなたを教える先輩</b>です。人柄や教え方を見て、「この人の下でやってみたい」と思ったら<b>ライク</b>を。気が合えば、まずご飯や一日体験から。
  </p>

  <div class="mentors" id="grid"></div>
</main>

<!-- profile modal -->
<div class="modal-bg" id="modalbg">
  <div class="modal" id="modal"></div>
</div>

<script src="app.js"></script>
<script>
  document.getElementById("bizname").textContent = BIZ.name;
  document.getElementById("bizsub").textContent = BIZ.trade + " ・ " + BIZ.area + " ・ " + BIZ.size;

  const grid = document.getElementById("grid");
  const modalbg = document.getElementById("modalbg");
  const modal = document.getElementById("modal");

  // デモでは毎回まっさらから始められるよう、リロード時に「本人が送ったライク」を消す。
  // (事業者ダッシュボードの土台になる seed リードは残す)
  saveLikes(loadLikes().filter(l => l.seed));

  // 「ライク済み」判定は “本人(この求職者)” のライクだけ。seed(他の求職者)では点かない。
  function isLiked(id) { return loadLikes().some(l => l.mentorId === id && !l.seed); }

  function flyHeart(fromEl) {
    if (!fromEl) return;
    const r = fromEl.getBoundingClientRect();
    const h = document.createElement("div");
    h.className = "fly-heart"; h.textContent = "♥";
    h.style.left = (r.left + r.width / 2 - 11) + "px";
    h.style.top = (r.top - 6) + "px";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 900);
  }

  function sendLike(id, fromEl) {
    if (isLiked(id)) return;
    const likes = loadLikes();
    likes.push({ mentorId: id, seeker: DEMO_SEEKER, at: new Date().toISOString(), status: "new" });
    saveLikes(likes);
    flyHeart(fromEl);
    render();
    showLikeSuccess(mentorById(id));
  }

  // ライク送信後の確認モーダル(端末内にスライドイン)
  function showLikeSuccess(m) {
    modal.innerHTML = `
      <div class="like-done">
        <div class="ld-badge">♥</div>
        <h3>ライクを送りました！</h3>
        <p><b>${m.name}</b> さん(${m.role})に<br>「あなたの下で働いてみたい」が届きました。</p>
        <div class="ld-steps">
          <div class="ld-step done"><span class="ld-n">✓</span>${BIZ.name} の担当者に通知が届く</div>
          <div class="ld-step"><span class="ld-n">2</span>まずは一緒にご飯(無料)</div>
          <div class="ld-step"><span class="ld-n">3</span>有給の一日体験で確かめる</div>
        </div>
        <button class="btn btn-primary btn-block" onclick="closeModal()">続けて先輩を見る</button>
        <p class="ld-foot">連絡が来るまで、他の先輩もチェックしてみましょう。</p>
      </div>`;
    modalbg.classList.add("open");
  }

  function metaRow(m) {
    return `<div class="mc-meta">
      ${m.rating ? `<span class="mm"><span class="star">★</span><b>${m.rating}</b></span>` : ""}
      ${m.trained ? `<span class="mm">育てた未経験 <b>${m.trained}</b>人</span>` : ""}
    </div>`;
  }

  function render() {
    grid.innerHTML = "";
    allMentors().forEach((m, i) => {
      const liked = isLiked(m.id);
      const el = document.createElement("div");
      el.className = "mcard";
      el.style.animationDelay = (i * 0.06) + "s";
      el.innerHTML = `
        <div class="mc-cover" style="background:${mentorFill(m)}"></div>
        <div class="mc-body">
          <div class="mc-top">
            <div class="avatar ${m.online ? "is-online" : ""}" style="background:${mentorFill(m)}">${m.initial}</div>
            <div style="min-width:0">
              <div class="mc-name">${m.name}</div>
              <div class="mc-role">${m.role} ・ ${m.years}</div>
            </div>
          </div>
          ${metaRow(m)}
          <p class="mc-blurb">${m.intro ? m.intro : "「" + m.style + "」"}</p>
          <div class="tags">${m.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
          <div class="mc-foot">
            <span class="mc-prev">${m.prevJob || ""}</span>
            <button class="likebtn ${liked ? "liked" : ""}" data-id="${m.id}">
              <span class="h">♥</span> ${liked ? "ライク済み" : "ライク"}
            </button>
          </div>
        </div>`;
      el.addEventListener("click", (e) => {
        const lb = e.target.closest(".likebtn");
        if (lb) { e.stopPropagation(); sendLike(m.id, lb); return; }
        openProfile(m.id);
      });
      grid.appendChild(el);
    });
  }

  function openProfile(id) {
    const m = mentorById(id);
    const liked = isLiked(id);
    modal.innerHTML = `
      <div class="m-hero">
        <button class="x" onclick="closeModal()">×</button>
        <div class="top" style="display:flex;gap:14px;align-items:center">
          <div class="avatar ${m.online ? "is-online" : ""}" style="background:${mentorFill(m)}">${m.initial}</div>
          <div>
            <h3 style="margin:0">${m.name}</h3>
            <div class="mrole">${m.role} ・ ${m.years}</div>
          </div>
        </div>
        ${metaRow(m)}
      </div>
      ${m.intro ? `<div class="field"><div class="k">自己紹介</div><div class="v">${m.intro}</div></div>` : ""}
      <div class="field"><div class="k">前職</div><div class="v">${m.prevJob}</div></div>
      ${(m.facts || []).map(f => `<div class="field"><div class="k">${f.k}</div><div class="v">${f.v}</div></div>`).join("")}
      <div class="field"><div class="k">教え方</div><div class="v">「${m.style}」</div></div>
      <div class="field"><div class="k">一日の流れ</div><div class="v">${m.aboutDay}</div></div>
      <div class="tags">${m.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
      <div class="actions">
        <button class="btn btn-primary btn-block" id="mlike" ${liked ? "disabled style=opacity:.55" : ""}>
          <span class="h">♥</span> ${liked ? "ライク済み(先方に通知されました)" : "この先輩にライクを送る"}
        </button>
      </div>
      <p style="font-size:12px;color:var(--muted);margin:14px 0 0;text-align:center">ライクを送ると、この会社の担当者に通知が届きます。連絡が来たら、まずはご飯や一日体験から。</p>`;
    const b = modal.querySelector("#mlike");
    if (!liked) b.addEventListener("click", () => sendLike(id, b));
    modalbg.classList.add("open");
  }
  function closeModal() { modalbg.classList.remove("open"); }
  window.closeModal = closeModal;
  modalbg.addEventListener("click", (e) => { if (e.target === modalbg) closeModal(); });

  render();
</script>
<script src="ui.js"></script>
</body>
</html>
